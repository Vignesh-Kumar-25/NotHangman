<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Robot -->
  <rect x="10" y="14" width="44" height="40" rx="6" fill="#475569" stroke="#7c3aed" stroke-width="2"/>
  <!-- Head band -->
  <rect x="10" y="14" width="44" height="10" rx="6" fill="#7c3aed"/>
  <!-- Antenna -->
  <line x1="32" y1="14" x2="32" y2="6" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="5" r="3" fill="#06b6d4"/>
  <!-- Eyes -->
  <rect x="18" y="28" width="10" height="8" rx="2" fill="#06b6d4"/>
  <rect x="36" y="28" width="10" height="8" rx="2" fill="#06b6d4"/>
  <!-- Eye glow -->
  <rect x="20" y="30" width="6" height="4" rx="1" fill="#e0f2fe" opacity="0.6"/>
  <rect x="38" y="30" width="6" height="4" rx="1" fill="#e0f2fe" opacity="0.6"/>
  <!-- Mouth -->
  <rect x="20" y="42" width="24" height="6" rx="3" fill="#334155"/>
  <rect x="23" y="44" width="4" height="2" rx="1" fill="#06b6d4"/>
  <rect x="30" y="44" width="4" height="2" rx="1" fill="#06b6d4"/>
  <rect x="37" y="44" width="4" height="2" rx="1" fill="#06b6d4"/>
</svg>
