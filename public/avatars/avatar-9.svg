  <path d="M54,25 Q60,24 58,18" stroke="#dc2626" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="24" cy="31" rx="5" ry="4" fill="#1c1917"/>
