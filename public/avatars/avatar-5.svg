<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Wizard -->
  <!-- Hat -->
  <polygon points="32,2 18,26 46,26" fill="#7c3aed" stroke="#5b21b6" stroke-width="1.5"/>
  <!-- Hat brim -->
  <rect x="12" y="24" width="40" height="6" rx="3" fill="#5b21b6"/>
  <!-- Stars on hat -->
  <text x="27" y="22" font-size="8" fill="#fbbf24">★</text>
  <!-- Face -->
  <circle cx="32" cy="40" r="18" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="25" cy="37" r="4" fill="#1c1917"/>
  <circle cx="39" cy="37" r="4" fill="#1c1917"/>
  <!-- Shine -->
  <circle cx="27" cy="35" r="1.5" fill="white"/>
  <circle cx="41" cy="35" r="1.5" fill="white"/>
  <!-- Smile -->
  <path d="M24 46 Q32 52 40 46" stroke="#92400e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Beard / beard suggestion -->
  <ellipse cx="32" cy="52" rx="8" ry="4" fill="#e5e7eb" opacity="0.6"/>
